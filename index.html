<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InesBot V1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>InesBotV1</h1>
                <p>We ALL fw this, right?</p>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="light-icon">☀️</span>
                <span class="dark-icon">🌙</span>
            </button>
        </header>

        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">Words loaded:</span>
                <span class="stat-value" id="word-count">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Results found:</span>
                <span class="stat-value" id="result-count">0</span>
            </div>
        </div>

        <div class="control-panel">
            <!-- Removed the Load Words button -->
            
            <div class="search-filters">
                <div class="filter-group">
                    <label for="prefix-input">Starts with:</label>
                    <input type="text" id="prefix-input" placeholder="e.g., 'ly'" class="filter-input">
                </div>
                
                <div class="filter-group">
                    <label for="suffix-input">Ends with:</label>
                    <input type="text" id="suffix-input" placeholder="e.g., 'ines'" class="filter-input">
                </div>
            </div>

            <div class="sort-options">
                <span class="sort-label">Sort by:</span>
                <label class="radio-label">
                    <input type="radio" name="sort" value="none" checked> Default
                </label>
                <label class="radio-label">
                    <input type="radio" name="sort" value="shortest"> Shortest First
                </label>
                <label class="radio-label">
                    <input type="radio" name="sort" value="longest"> Longest First
                </label>
                <label class="radio-label">
                    <input type="radio" name="sort" value="alpha"> Alphabetical
                </label>
            </div>

            <div class="action-buttons">
                <button id="search-btn" class="btn btn-search">Search</button>
                <button id="clear-btn" class="btn btn-clear">Clear All</button>
            </div>
        </div>

        <div class="results-container">
            <div id="results-box" class="results-box">
                <p class="placeholder-text">Loading words from GitHub...</p>
            </div>
        </div>

        <footer>
            <p>Mountain Peak</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
